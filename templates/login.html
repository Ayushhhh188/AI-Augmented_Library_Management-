<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Central Coalfields Library</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='stylelogin.css') }}">
</head>
<body>

    <!-- Header -->
    <header>
        <div class="logo">
            <img src="{{ url_for('static', filename='images/CCL.jpg') }}" alt="Company Logo">
        </div>
        <div class="site-title">
            <h1>Central Coalfields Limited</h1>
        </div>
    </header>

    <!-- Login Container -->
    <div class="login-container">
        <h2>Sign in to Library System</h2>

        <p class="login-info">
            Secure access using your Google account.
        </p>

        <!-- Google Login Button -->
        <a href="{{ url_for('login') }}" class="google-login-btn">
            <img src="{{ url_for('static', filename='images/google_icon.png') }}" alt="Google Icon">
            Sign in with Google
        </a>

        <p class="register-link">
            Access is role-based. Contact IT Department for admin privileges.
        </p>
    </div>

</body>
</html>
